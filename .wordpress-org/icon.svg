<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2327"/>
      <stop offset="100%" stop-color="#2c3338"/>
    </linearGradient>
    <linearGradient id="shield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0073aa"/>
      <stop offset="100%" stop-color="#005f8d"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="256" height="256" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Shield shape - centered, representing isolation/protection -->
  <path d="M128 36
           L194 62
           C194 62 198 130 172 170
           C152 200 128 216 128 216
           C128 216 104 200 84 170
           C58 130 62 62 62 62
           Z"
        fill="url(#shield)" opacity="0.95"/>

  <!-- Shield highlight/border -->
  <path d="M128 36
           L194 62
           C194 62 198 130 172 170
           C152 200 128 216 128 216
           C128 216 104 200 84 170
           C58 130 62 62 62 62
           Z"
        fill="none" stroke="#00a0d2" stroke-width="2" opacity="0.5"/>

  <!-- Mountain/landscape icon inside shield - represents media/images -->
  <g transform="translate(128, 118)">
    <!-- Image frame -->
    <rect x="-38" y="-30" width="76" height="56" rx="4" ry="4"
          fill="none" stroke="white" stroke-width="3" opacity="0.9"/>

    <!-- Large mountain -->
    <polygon points="-30,20 -6,-14 18,20"
             fill="white" opacity="0.9"/>

    <!-- Small mountain -->
    <polygon points="2,20 18,-4 34,20"
             fill="white" opacity="0.65"/>

    <!-- Sun circle -->
    <circle cx="20" cy="-14" r="8" fill="white" opacity="0.75"/>
  </g>

  <!-- Browser window element - bottom right, represents client-side -->
  <g transform="translate(185, 185)">
    <rect x="0" y="0" width="40" height="30" rx="4" ry="4"
          fill="#00a0d2" opacity="0.9"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="40" height="10" rx="4" ry="0"
          fill="#00a0d2"/>
    <rect x="0" y="4" width="40" height="6"
          fill="#00a0d2"/>
    <!-- Title bar dots -->
    <circle cx="7" cy="5" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="13" cy="5" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="19" cy="5" r="1.5" fill="white" opacity="0.8"/>
    <!-- Content area -->
    <rect x="2" y="12" width="36" height="16" rx="1" ry="1"
          fill="#1d2327" opacity="0.4"/>
    <!-- Lock icon in browser (security/isolation) -->
    <g transform="translate(20, 20)">
      <rect x="-4" y="-2" width="8" height="6" rx="1" fill="white" opacity="0.8"/>
      <path d="M-2,-2 L-2,-5 A2,2 0 0,1 2,-5 L2,-2"
            fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
    </g>
  </g>
</svg>
